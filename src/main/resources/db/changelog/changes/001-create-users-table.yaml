databaseChangeLog:
  - changeSet:
      id: 1
      author: daria
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: password
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: role
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: is_account_non_locked
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: failed_attempts
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: deleted_at
                  type: TIMESTAMP

        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: publication_year
                  type: SMALLINT
              - column:
                  name: page_count
                  type: INT
              - column:
                  name: is_hardcover
                  type: BOOLEAN
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_book_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: deleted_at
                  type: TIMESTAMP