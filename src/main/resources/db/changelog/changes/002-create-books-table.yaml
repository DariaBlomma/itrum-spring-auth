databaseChangeLog:
  - changeSet:
      id: 2
      author: daria
      changes:
        - createTable:
            tableName: books
            columns:
              - column:
                  name: id
                  type: BIGSERIAL
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(200)
                  constraints:
                    nullable: false
              - column:
                  name: publication_year
                  type: SMALLINT
              - column:
                  name: page_count
                  type: INT
              - column:
                  name: is_hardcover
                  type: BOOLEAN
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_book_user
                    referencedTableName: users
                    referencedColumnNames: id
              - column:
                  name: deleted_at
                  type: TIMESTAMP