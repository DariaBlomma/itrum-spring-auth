spring:
  application:
    name: auth
  h2:
    console:
      enabled: true  # Включаем веб-консоль
      path: /h2-console  # Доступ по http://localhost:8080/api/h2-console
      settings:
        web-allow-others: false
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
    jpa:
      open-in-view: false
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
    jackson:
      default-property-inclusion: non_null
    profiles:
      active: dev #or prod
  server:
    port: 8080
    servlet:
      context-path: /api