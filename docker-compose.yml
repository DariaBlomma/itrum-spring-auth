services:
  postgres:
    image: postgres:16-alpine
    container_name: spring-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: testdb
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: spring-auth
    restart: unless-stopped
    ports:
      - "8443:8443"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/testappdb
      SPRING_DATASOURCE_USERNAME: testappuser
      SPRING_DATASOURCE_PASSWORD: testapppass
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: